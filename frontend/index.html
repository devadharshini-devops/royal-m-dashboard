<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Project Management Tool</title>
<style>
  body { background: #0a1a3a; color: white; font-family: Arial; text-align: center; }
  h1 { color: gold; }
  .container { width: 90%; margin: auto; }
  .add-task { background: #122c5a; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
  input, button { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid gold; background: #0a1a3a; color: gold; }
  button { background: gold; color: #0a1a3a; font-weight: bold; cursor: pointer; }
  .board { display: flex; justify-content: space-around; }
  .task-column { background: #122c5a; width: 30%; padding: 10px; border-radius: 10px; min-height: 300px; }
  .task-column h3 { border-bottom: 2px solid gold; padding-bottom: 5px; }
  .task { background: #1a2a4d; padding: 10px; margin: 10px 0; border-radius: 8px; text-align: left; }
  .task button { padding: 5px 8px; font-size: 12px; margin: 2px; }
</style>
</head>
<body>

<h1>👑 Royal Project Management Tool</h1>

<div class="container">
  <div class="add-task">
    <h3>Add New Task</h3>
    <input type="text" id="title" placeholder="Task Title">
    <input type="text" id="project" placeholder="Project Name">
    <input type="text" id="assigned" placeholder="Assigned To">
    <input type="date" id="deadline">
    <br>
    <button onclick="addTask()">+ Add Task</button>
  </div>

  <div class="board">
    <div class="task-column">
      <h3>📝 Todo</h3>
      <div id="todo"></div>
    </div>
    <div class="task-column">
      <h3>⚡ In Progress</h3>
      <div id="progress"></div>
    </div>
    <div class="task-column">
      <h3>✅ Done</h3>
      <div id="done"></div>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:5000";

// 1. Add Task
async function addTask() {
  const task = {
    title: document.getElementById("title").value,
    project: document.getElementById("project").value,
    assignedTo: document.getElementById("assigned").value,
    deadline: document.getElementById("deadline").value,
  };
  await fetch(`${API}/addtask`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(task)
  });
  alert("Task Added ✅");
  loadTasks(); 
  document.getElementById("title").value = "";
}

// 2. Load All Tasks
async function loadTasks() {
  const res = await fetch(`${API}/tasks`);
  const tasks = await res.json();
  
  document.getElementById("todo").innerHTML = "";
  document.getElementById("progress").innerHTML = "";
  document.getElementById("done").innerHTML = "";

  tasks.forEach(t => {
    const div = `<div class="task">
      <b>${t.title}</b><br>
      Project: ${t.project}<br>
      To: ${t.assignedTo}<br>
      Due: ${t.deadline ? t.deadline.split("T")[0] : ''}<br>
      <button onclick="updateStatus('${t._id}', 'Todo')">Todo</button>
      <button onclick="updateStatus('${t._id}', 'In Progress')">Progress</button>
      <button onclick="updateStatus('${t._id}', 'Done')">Done</button>
    </div>`;
    
    if(t.status === "Todo") document.getElementById("todo").innerHTML += div;
    if(t.status === "In Progress") document.getElementById("progress").innerHTML += div;
    if(t.status === "Done") document.getElementById("done").innerHTML += div;
  });
}

// 3. Update Status
async function updateStatus(id, status) {
  await fetch(`${API}/updatestatus/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({status})
  });
  loadTasks(); 
}

// Page open aana odane load aagum
window.onload = loadTasks;
</script>

</body>
</html>
