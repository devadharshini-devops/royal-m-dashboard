<!DOCTYPE html>
<html>
<head>
  <title>Royal Task Manager</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { display: flex; gap: 20px; }
    .column { background: white; padding: 15px; border-radius: 8px; width: 50%; }
    .task { background: #e3f2fd; padding: 10px; margin: 10px 0; border-radius: 5px; }
    input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #1976d2; color: white; cursor: pointer; }
    button:hover { background: #1565c0; }
    h3 { text-align: center; }
    #msg { color: green; }
  </style>
</head>
<body>

<h2>Royal Task Manager</h2>

<input type="text" id="title" placeholder="Task Title">
<input type="date" id="due">
<button onclick="addTask()">Add Task</button>
<p id="msg"></p>

<div class="container">
  <div class="column">
    <h3>Todo</h3>
    <div id="todo"></div>
  </div>
  <div class="column">
    <h3>Done</h3>
    <div id="done"></div>
  </div>
</div>

<script>
const API = "https://royal-project-hvye.vercel.app";

loadTasks();

async function loadTasks() {
  const res = await fetch(API + "/tasks");
  const tasks = await res.json();
  
  document.getElementById("todo").innerHTML = "";
  document.getElementById("done").innerHTML = "";

  tasks.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";
    div.innerHTML = `<b>${task.title}</b><br>Due: ${task.due}`;
    
    if(task.status === "done") {
      document.getElementById("done").appendChild(div);
    } else {
      document.getElementById("todo").appendChild(div);
    }
  });
}

async function addTask() {
  const title = document.getElementById("title").value;
  const due = document.getElementById("due").value;
  const msg = document.getElementById("msg");

  if(!title || !due) {
    msg.innerText = "Please fill all fields";
    return;
  }

  await fetch(API + "/tasks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, due, status: "todo" })
  });

  document.getElementById("title").value = "";
  document.getElementById("due").value = "";
  msg.innerText = "Task Added!";
  loadTasks();
}
</script>

</body>
</html>
