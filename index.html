<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management Tool - CodSoft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [projects, setProjects] = useState([
        { id: 1, name: "CodSoft Internship", deadline: "2026-05-01", tasks: [
          { id: 1, name: "UI Design 😍", assignee: "Devadharshini", deadline: "2026-04-20", status: "In Progress" },
          { id: 2, name: "Backend API 🚀", assignee: "Team", deadline: "2026-04-25", status: "To Do" }
        ]}
      ]);
      const [newProjectName, setNewProjectName] = useState("");

      const addProject = () => {
        if(newProjectName.trim() === "") return;
        setProjects([...projects, {
          id: Date.now(),
          name: newProjectName,
          deadline: "",
          tasks: []
        }]);
        setNewProjectName("");
      }

      const updateTaskStatus = (projId, taskId, status) => {
        setProjects(projects.map(p => 
          p.id === projId ? {...p, tasks: p.tasks.map(t => 
            t.id === taskId ? {...t, status} : t
          )} : p
        ));
      }

      const getProgress = (tasks) => {
        if(tasks.length === 0) return 0;
        const done = tasks.filter(t => t.status === "Done").length;
        return Math.round((done / tasks.length) * 100);
      }

      return (
        <div className="p-6 max-w-5xl mx-auto">
          <h1 className="text-3xl font-bold text-blue-700 mb-2">📊 Project Management Tool</h1>
          <p className="text-gray-600 mb-6">Create Projects, Assign Tasks, Set Deadlines & Track Progress</p>

          {/* Add Project - No Add Task Button */}
          <div className="bg-white p-4 rounded-lg shadow mb-6">
            <h2 className="font-semibold mb-2">➕ Create New Project</h2>
            <div className="flex gap-2">
              <input 
                type="text" 
                placeholder="Project Name" 
                value={newProjectName}
                onChange={(e) => setNewProjectName(e.target.value)}
                className="border p-2 rounded w-full"
              />
              <button onClick={addProject} className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Create
              </button>
            </div>
          </div>

          {/* Projects List */}
          {projects.map(project => (
            <div key={project.id} className="bg-white p-4 rounded-lg shadow mb-4">
              <div className="flex justify-between items-center mb-3">
                <h2 className="text-xl font-bold">📁 {project.name}</h2>
                <span className="text-sm bg-green-200 text-green-800 px-3 py-1 rounded-full">
                  Progress: {getProgress(project.tasks)}%
                </span>
              </div>

              {/* Tasks Table */}
              <table className="w-full text-left">
                <thead>
                  <tr className="border-b">
                    <th className="p-2">Task</th>
                    <th className="p-2">Assignee</th>
                    <th className="p-2">Deadline</th>
                    <th className="p-2">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {project.tasks.map(task => (
                    <tr key={task.id} className="border-b">
                      <td className="p-2">{task.name}</td>
                      <td className="p-2">👤 {task.assignee}</td>
                      <td className="p-2">📅 {task.deadline}</td>
                      <td className="p-2">
                        <select 
                          value={task.status} 
                          onChange={(e) => updateTaskStatus(project.id, task.id, e.target.value)}
                          className="border rounded p-1"
                        >
                          <option>To Do</option>
                          <option>In Progress</option>
                          <option>Done ✅</option>
                        </select>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {project.tasks.length === 0 && <p className="text-gray-400 mt-2">No tasks yet. Add tasks from backend/MongoDB 😊</p>}
            </div>
          ))}
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
