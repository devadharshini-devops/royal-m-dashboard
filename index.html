<!DOCTYPE html>
<html>
<head>
  <title>Project Management Tool</title>
  <style>
    body { font-family: Arial; background: #0a1a3a; color: white; padding: 20px; }
    h1 { color: #ffc107; }
    .card { background: #1e3a6e; padding: 20px; border-radius: 10px; margin: 10px; }
    input, button { padding: 10px; border-radius: 8px; border: 2px solid #ffc107; background: #0a1a3a; color: white; }
    button { background: #ffc107; color: black; font-weight: bold; cursor: pointer; }
    .kanban { display: flex; gap: 10px; }
    .column { flex: 1; background: #1e3a6e; padding: 15px; border-radius: 10px; min-height: 200px; }
  </style>
</head>
<body>
  <h1>Project Management Tool</h1>

  <div class="card">
    <h3>New Task</h3>
    <input id="title" placeholder="Task Name">
    <input id="due" type="date">
    <button onclick="addTask()">+ Add Task</button>
    <p id="msg"></p>
  </div>

  <div class="kanban">
    <div class="column"><h4>In Progress</h4><div id="todo"></div></div>
    <div class="column"><h4>Done</h4><div id="done"></div></div>
  </div>

<script>
const API = "https://royal-project-hvye.vercel.app";
loadTasks();

async function addTask() {
  const title = document.getElementById("title").value;
  const due = document.getElementById("due").value;
  if(!title) return alert("Task name podu");
  
  const res = await fetch(API + "/tasks", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({title: title, due: due, status: "To Do"})
  });
  
  if(res.ok){
    document.getElementById("msg").innerText = "✅ Task Added";
    document.getElementById("title").value = "";
    loadTasks();
  } else {
    document.getElementById("msg").innerText = "❌ Error: " + res.status;
  }
}

async function loadTasks() {
  const res = await fetch(API + "/tasks");
  const tasks = await res.json();
  document.getElementById("todo").innerHTML = tasks.map(t=>`<div class="card">${t.title}</div>`).join('');
}
</script>
</body>
</html>
